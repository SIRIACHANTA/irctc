<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        background-image: url(irctc.jpg);
        background-repeat: no-repeat;
        justify-content: space-evenly;
      }
      .h1 {
        font-style: normal;
        padding-left: 55%;
        margin-bottom: 5px;
      }
      .h2 {
        font-style: normal;
        padding-left: 57%;
        margin-top: 0px;
      }
      .container {
        width: 600px;
        margin: 40px auto;
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 4px 10px rgba(35, 15, 146, 0.5);
        overflow: hidden;
        align-items: center;
        margin-left: 80px;
        margin-top: -80px;
      }
      .header {
        display: flex;
      }
      .header div {
        flex: 1;
        padding: 12px;
        text-align: center;
        background: #2f4a7d;
        color: white;
        font-weight: bold;
      }
      .header div:last-child {
        background: #3e5f9a;
      }
      .content {
        padding: 30px;
      }
      .title {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 25px;
        color: #2f4a7d;
      }
      .row {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
      }
      .input-box {
        flex: 1;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .checkbox-row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        font-size: 14px;
      }
      .button {
        text-align: center;
        margin-top: 25px;
      }
      button {
        background: #ff7a2f;
        border: none;
        padding: 12px 30px;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }
      button:hover {
        background: #e5671f;
      }
    </style>
  </head>
  <body>
    <h1 class="h1">
      <span style="color: navy">INDIAN RAILWAYS</span>
    </h1>
    <h2 class="h2">
      <span style="color: navy">Safety | Security | Punctuality</span>
    </h2>
    <div class="container">
      <div class="header">
        <div>PNR STATUS</div>
        <div>CHARTS / VACANCY</div>
      </div>

      <div class="content">
        <div class="title">BOOK TICKET</div>

        <div class="row">
          <div class="input-box">
            <input type="text" placeholder="From" />
          </div>
          <div class="input-box">
            <input type="text" placeholder="To" />
          </div>
        </div>

        <div class="row">
          <div class="input-box">
            <input type="date" value="2026-03-24" />
          </div>
          <div class="input-box">
            <select>
              <option>All Classes</option>
              <option>ALL CLASSES</option>
              <option>Anubhuti Class (EA)</option>
              <option>AC First Class (1A)</option>
              <option>Vistadome AC (EV)</option>
              <option>Exec. Chair Car (EC)</option>
              <option>AC 2 Tier (2A)</option>
              <option>First Class (FC)</option>
              <option>AC 3 Tier (3A)</option>
              <option>AC 3 Economy (3E)</option>
              <option>AC Chair Car (CC)</option>
              <option>Sleeper (SL)</option>
              <option>Vistadome Non AC (VS)</option>
              <option>Second Sitting (2S)</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="input-box">
            <select>
              <option>GENERAL</option>
              <option>GENERAL</option>
              <option>LADIES</option>
              <option>LOWER BERTH/SR.CITIZEN</option>
              <option>PERSON WITH DISABILITY</option>
              <option>DUTY PASS</option>
              <option>TATKAL</option>
              <option>PREMIUM TATKAL</option>
            </select>
          </div>
        </div>

        <div class="checkbox-row">
          <label><input type="checkbox" /> Person With Disability Concession</label>
          <label><input type="checkbox" /> Flexible With Date</label>
          <label><input type="checkbox" /> Railway Pass Concession</label>
        </div>

        <div class="button">
          <button>Search Trains</button>
        </div>
      </div>
    </div>
  </body>
</html>
