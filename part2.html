<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    body {
      background-color: whitesmoke;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .second {
      background-color: white;
      padding-bottom: 50px;
      margin: 20px;
      border-radius: 10px;
    }

    .ht {
      text-align: center;
      padding: 20px;
    }

    .container1,
    .container2 {
      display: flex;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
    }

    .container1 {
      margin-bottom: 30px;
    }

    .circle {
      width: 90px;
      height: 90px;
      background-color: white;
      border-radius: 50%;
      border: 1px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: 0.3s;
    }

    .circle:hover {
      background-color: rgb(10, 10, 123);
      color: white;
    }

    .service {
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    .service span {
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="second">
    <h1 class="ht">
      Have you not found the right one? <br />
      Find a service suitable for you here.
    </h1>

    <div class="container1">
      <div class="service">
        <div class="circle"><i class="fa-solid fa-plane"></i></div>
        <span>Flights</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-hotel"></i></div>
        <span>Hotel</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-chart-line"></i></div>
        <span>Rail Drishti</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-bell-concierge"></i></div>
        <span>E-Catering</span>
      </div>
    </div>

    <div class="container2">
      <div class="service">
        <div class="circle"><i class="fa-solid fa-umbrella-beach"></i></div>
        <span>Holiday Package</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-train"></i></div>
        <span>Tourist Train</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-mountain-sun"></i></div>
        <span>Hill Railways</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-train-subway"></i></div>
        <span>Charter Train</span>
      </div>

      <div class="service">
        <div class="circle"><i class="fa-solid fa-image"></i></div>
        <span>Gallery</span>
      </div>
    </div>
  </div>
</body>
</html>
